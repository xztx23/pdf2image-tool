name: PDF to Images

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'PDF 文件的直接下载链接'
        required: true
        type: string
      student_id:
        description: '学生学号（用于创建子文件夹）'
        required: true
        type: string

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          # 强制把代码检出到根目录，不嵌套
          path: .
          fetch-depth: 0

      - name: 安装系统依赖（poppler-utils）
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行 PDF 转换脚本
        run: |
          # 先打印当前目录和文件列表，确认文件存在
          pwd
          ls -la
          python convert.py "${{ github.event.inputs.pdf_url }}" "${{ github.event.inputs.student_id }}"

      - name: 提交并推送生成的图片
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "auto save image" || echo "No changes to commit"
          git push
